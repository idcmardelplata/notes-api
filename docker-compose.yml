services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: notes_api
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  relay-proxy:
    image: gofeatureflag/go-feature-flag:latest
    ports:
      - "1031:1031"
    volumes:
      - .:/goff
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:1031/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: notes_api
      DB_USER: postgres
      DB_PASSWORD: postgres
      PORT: "3000"
      FLAG_ENDPOINT: http://relay-proxy:1031
    depends_on:
      db:
        condition: service_healthy
      relay-proxy:
        condition: service_started

volumes:
  pgdata:
